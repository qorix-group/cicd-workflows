name: Tests

on:
  workflow_call:
    inputs:
      bazel-target:
        description: "Custom Bazel target to run (e.g.: 'test //src/...')"
        required: false
        default: "test //..."
        type: string
      upload-name:
        description: "Custom name to upload test results to (e.g. Bazel Test Results). Leave as default to skip upload."
        required: false
        default: "NO UPLOAD OF TEST RESULTS CONFIGURED"
        type: string
      result-paths:
        description: "Custom paths to upload test results from (e.g.: 'bazel-testlogs/**/*.xml')"
        required: false
        default: |
          bazel-testlogs/**/*.xml
          bazel-testlogs/**/test.log
        type: string
      packages:
        description: "Custom packages to install before running tests"
        required: false
        default: ""
        type: string

jobs:
  unit-tests:
    name: Test Execution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (Handle all events)
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.head_ref || github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Install dependencies
        if: ${{ inputs.packages != '' }}
        uses: eclipse-score/apt-install@main
        with:
          packages: ${{ inputs.packages }}
          cache: false

      - name: Setup Bazel with shared caching
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          disk-cache: true
          repository-cache: true
          bazelisk-cache: true
          cache-save: ${{ github.event_name == 'push' }}

      - name: Run Tests via Bazel
        run: |
          echo "Running: bazel ${{ inputs.bazel-target }}"
          bazel ${{ inputs.bazel-target }}

      - name: Upload Bazel test artifacts
        if: ${{ always() && inputs.upload-name != 'NO UPLOAD OF TEST RESULTS CONFIGURED' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.upload-name }}
          path: |
            ${{ inputs.result-paths }}
          if-no-files-found: warn
          compression-level: 6
